<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Glow Society - Search Results</title>
</head>

<body>

    <div id="header-container"></div>

    <article class="main-content">
        <aside class="category-bar" id="sidebar-container">
            <p style="font-size: 16px; color: #888; padding: 20px;">กำลังโหลดหมวดหมู่...</p>
        </aside>

        <section class="product-area">
            <div id="sort-container"></div>

            <div class="product-grid" id="search-result-container">
                <p style="font-size: 18px; color: #888;">Loading Product...</p>
            </div>

            <div class="load-more-section">
                <p>You have seen 1 products out of 20.</p>
                <button class="btn-view-more">View more</button>
            </div>
        </section>
    </article>

    <div id="footer-container"></div>

    <script src="script.js"></script>
</body>

</html>
