<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Glow Society - Search Results</title>
</head>
<body>
    
    <div id="header-container"></div>

    <article class="main-content">
        <aside class="category-bar" id="sidebar-container">
            <p style="font-size: 16px; color: #888; padding: 20px;">Loading categories...</p>
        </aside>

        <section class="product-area">
            <div class="sort-section">
                <label>Sort:</label>
                <div class="custom-dropdown">
                    <div class="dropdown-trigger">
                        <span class="selected-text">New arrivals</span>
                        <span class="arrow-down">&#9662;</span>
                    </div>
                    <ul class="dropdown-options">
                        <li data-value="new-arrivals" class="active">New arrivals</li>
                        <li data-value="best-seller">Best seller</li>
                        </ul>
                </div>
            </div>
            
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-image"><img src="img/image 3.png" alt="Maybelline"></div>
                    <div class="product-info">
                        <div class="product-brand">MAYBELLINE NEW YORK</div>
                        <div class="product-name">Volume Express Hyper Curl Waterproof</div>
                        <div class="product-price">฿ 179.00</div>
                    </div>
                    <div class="product-footer">
                        <div class="product-rating">
                            <span class="stars-filled">&#9733;&#9733;&#9733;&#9733;</span><span class="stars-empty">&#9733;</span>
                            <span class="rating-score">4.0</span>
                        </div>
                        <button class="btn-cart">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="load-more-section">
                    <p>You have seen 9 products out of 20.</p>
                    <button class="btn-view-more">View more</button>
                </div>
            </div>
        </section>
    </article>

    <footer>
         </footer>

    <script src="script.js"></script>
</body>
</html>
