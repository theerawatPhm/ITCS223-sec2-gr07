<header>
    <a href="index.html">
        <img src="assets/img/logoWeb.svg" alt="logoWeb" class="header-logo">
    </a>
    <div class="header-right-section">
        <img src="assets/icon/Login.svg" alt="user" class="user-icon">
        <div class="header-search-box">
            <input type="text" placeholder="Search..." readonly>
            <img src="assets/icon/search.svg" alt="Search" class="search-icon">
        </div>
    </div>
</header>

<div id="loginModal" class="modal-overlay">
    </div>

<div id="searchModal" class="modal-overlay">
    <div class="modal-content">
        <div class="form-group">
            <label>Brand</label>
            <div class="input-wrapper">
                <input type="text">
                <span class="clear-icon">&#10005;</span>
            </div>
        </div>
        <div class="form-group">
            <label>Product</label>
            <div class="input-wrapper">
                <input type="text">
                <span class="clear-icon">&#10005;</span>
            </div>
        </div>
        <div class="form-group">
            <label>Ingredient</label>
            <div class="input-wrapper">
                <input type="text">
                <span class="clear-icon">&#10005;</span>
            </div>
        </div>
        <div class="form-group align-center">
            <label>Rating</label>
            <div class="rating">
                <span class="star" data-value="1">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="5">&#9733;</span>
            </div>
        </div>
        <div class="form-group align-center">
            <label>Filter</label>
            <div class="checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" checked>
                    <span class="checkmark"></span>
                    Cruelty-free
                </label>
                <label class="custom-checkbox">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Dermatologically tested
                </label>
            </div>
        </div>
        <div class="popular-search-section">
            <p>Popular search</p>
            <div class="tags-container">
                <span class="search-tag">GALA</span>
                <span class="search-tag">3CE</span>
                <span class="search-tag">BABY BRIGHT</span>
                <span class="search-tag">CeraVe</span>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-clear" id="closeModalBtn">Clear</button>
            <button class="btn-search-action">Search</button>
        </div>
    </div>
</div>
